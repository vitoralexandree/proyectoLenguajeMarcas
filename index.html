<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bienvenidos</title>
  <style>
    /* cores acolhedoras */
    :root {
      --bg-color: #f7f2ef;
      --accent-color: #f2c6a0;
      --text-color: #4a4a4a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 1rem;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    h1 {
      margin-bottom: 1rem;
      font-size: 2rem;
      color: var(--accent-color);
    }

    img.welcome-gif {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, .1);
    }

    @media (min-width: 768px) {
      h1 {
        font-size: 2.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>¡Bienvenidos, alumnos!</h1>
    <img class="welcome-gif" src="https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif" alt="Hola! Esta es mi primera pagina web" />
    <!-- Se você quer baixar localmente, execute:
         curl -L -o welcome.gif https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif
         e depois atualize src para "welcome.gif" -->
  </div>
</body>

</html>
